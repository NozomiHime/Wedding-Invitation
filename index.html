<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:#f8f4ef;
color:#444;
text-align:center;
}

.hero{

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:30px;

background:
linear-gradient(rgba(255,255,255,.55),rgba(255,255,255,.55)),
url("cover.jpg");

background-size:cover;
background-position:center;

}

h1{

font-family:"Great Vibes";
font-size:65px;
color:#b67d4b;

margin-bottom:10px;

}

h2{

font-size:28px;

margin-bottom:20px;

}

p{

max-width:650px;

line-height:1.8;

margin-bottom:25px;

}

button{

padding:15px 40px;

border:none;

border-radius:50px;

background:#b67d4b;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

section{

padding:70px 20px;

}

video{

width:100%;

max-width:900px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.info{

font-size:18px;

margin-top:30px;

line-height:2;

}

.maps{

display:inline-block;

margin-top:25px;

padding:15px 35px;

background:#b67d4b;

color:white;

text-decoration:none;

border-radius:50px;

}

footer{

margin-top:70px;

padding:30px;

background:#eee;

}

</style>

</head>

<body>

<div class="hero">

<h1>Wedding Invitation</h1>

<h2>Faisal & April</h2>

<p>
  
You are invited to our Wedding
Hopefully we can share our blessfull day to you
  
</p>

<button onclick="document.getElementById('video').scrollIntoView({behavior:'smooth'})">

Invitation

</button>

</div>

<section id="video">

<h2>Video Invitation</h2>

<br>

<video controls autoplay>

<source src="Wedding Invitation.mp4" type="video/mp4">

Browser Anda tidak mendukung video.

</video>

<div class="info">

<p>

  Akad
📅 Monday, July 13 2026

<br>

🕘 09.00 WIB

<br>

📍 KUA Mandalajati, Kota Bandung, Jawa Barat

</p>

<a class="maps"

href="https://maps.app.goo.gl/7QXdgeA2xWVeJfRA8"

target="_blank">

Lihat Lokasi

</a>

</div>

</section>

<footer>

Terima kasih atas doa dan kehadirannya ❤️

</footer>

</body>

</html>
